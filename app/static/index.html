<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevDocs</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --sidebar-bg: #161822;
    --surface: #1c1e2a;
    --surface-hover: #242736;
    --border: #2a2d3a;
    --text: #e1e4ed;
    --text-secondary: #8b8fa3;
    --text-muted: #5b5f73;
    --accent: #818cf8;
    --accent-glow: #818cf833;
    --accent-gradient: linear-gradient(135deg, #818cf8, #c084fc);
    --green: #34d399;
    --red: #f87171;
    --radius: 10px;
    --radius-sm: 6px;
    --radius-lg: 14px;
  }

  html, body { height: 100%; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.5; }

  .layout { display: flex; height: 100vh; }

  /* Sidebar */
  .sidebar {
    width: 280px; min-width: 280px;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 1.5rem;
    gap: 1.5rem;
  }
  .sidebar-header { display: flex; align-items: center; gap: 0.65rem; }
  .sidebar-header h2 { font-size: 1.25rem; font-weight: 700; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .sidebar-header .badge {
    background: var(--accent); color: #fff;
    font-size: 0.6rem; font-weight: 700; letter-spacing: 0.5px;
    padding: 0.15rem 0.5rem; border-radius: 999px; text-transform: uppercase;
  }
  .status-line { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; color: var(--text-secondary); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.offline { background: var(--red); box-shadow: 0 0 6px var(--red); }

  .sidebar-section { display: flex; flex-direction: column; gap: 0.5rem; }
  .sidebar-section h3 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); font-weight: 600; }
  .sidebar-section p { font-size: 0.78rem; color: var(--text-secondary); line-height: 1.5; }

  .toggle-row { display: flex; align-items: center; justify-content: space-between; }
  .toggle-row label { font-size: 0.82rem; color: var(--text-secondary); cursor: pointer; }
  .toggle { position: relative; display: inline-block; width: 36px; height: 20px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: var(--border); border-radius: 999px; transition: 0.2s; }
  .toggle .slider::before { content: ''; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.2s; }
  .toggle input:checked + .slider { background: var(--accent); }
  .toggle input:checked + .slider::before { transform: translateX(16px); }

  .btn-clear { width: 100%; padding: 0.5rem; background: transparent; border: 1px solid var(--border); color: var(--text-secondary); border-radius: var(--radius-sm); font-size: 0.8rem; cursor: pointer; transition: all 0.15s; }
  .btn-clear:hover { background: var(--surface-hover); color: var(--text); border-color: var(--text-muted); }

  .divider { border: none; border-top: 1px solid var(--border); margin: 0; }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .chat-area { flex: 1; overflow-y: auto; padding: 1.5rem 2rem; display: flex; flex-direction: column; gap: 1rem; }

  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; color: var(--text-muted); text-align: center; }
  .empty-state .icon { font-size: 3rem; opacity: 0.4; }
  .empty-state h3 { font-size: 1.1rem; font-weight: 600; color: var(--text-secondary); }
  .empty-state p { font-size: 0.85rem; }

  .msg { padding: 0.85rem 1rem; border-radius: var(--radius); max-width: 85%; line-height: 1.6; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { background: var(--surface); border: 1px solid var(--border); align-self: flex-end; color: var(--text); }
  .msg.assistant { background: transparent; border: 1px solid var(--border); align-self: flex-start; color: var(--text); }
  .msg .label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 0.35rem; }
  .msg.user .label { color: var(--accent); }
  .msg.assistant .label { color: var(--green); }

  .msg a { color: var(--accent); text-decoration: underline; }
  .msg code { background: var(--surface); padding: 0.1rem 0.35rem; border-radius: 3px; font-size: 0.85em; color: var(--accent); }
  .msg pre { background: var(--surface); padding: 0.75rem 1rem; border-radius: var(--radius-sm); overflow-x: auto; font-size: 0.85em; line-height: 1.5; border: 1px solid var(--border); margin: 0.5rem 0; }
  .msg ul, .msg ol { padding-left: 1.25rem; margin: 0.25rem 0; }

  .sources-row { display: flex; flex-wrap: wrap; gap: 0.3rem; padding-left: 1rem; }
  .source-tag { display: inline-flex; align-items: center; gap: 0.3rem; background: rgba(129, 140, 248, 0.1); color: var(--accent); padding: 0.2rem 0.55rem; border-radius: var(--radius-sm); font-size: 0.72rem; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; border: 1px solid rgba(129, 140, 248, 0.15); }

  .input-area { padding: 1rem 2rem 1.5rem; background: var(--bg); border-top: 1px solid var(--border); }
  .input-row { display: flex; gap: 0.5rem; align-items: flex-end; }
  .input-row input { flex: 1; padding: 0.7rem 1rem; border-radius: var(--radius); background: var(--surface); border: 1px solid var(--border); color: var(--text); font-size: 0.9rem; outline: none; transition: border-color 0.15s; font-family: inherit; }
  .input-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .input-row input::placeholder { color: var(--text-muted); }
  .input-row button { padding: 0.7rem 1.5rem; border-radius: var(--radius); background: var(--accent-gradient); color: #fff; border: none; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all 0.15s; font-family: inherit; white-space: nowrap; }
  .input-row button:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 12px var(--accent-glow); }
  .input-row button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  .spinner { display: flex; align-items: center; gap: 0.5rem; color: var(--text-secondary); font-size: 0.85rem; padding: 0.5rem 0; }
  .spinner::before { content: ''; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg { background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.2); color: var(--red); padding: 0.5rem 0.75rem; border-radius: var(--radius-sm); font-size: 0.8rem; }

  @media (max-width: 640px) {
    .layout { flex-direction: column; }
    .sidebar { width: 100%; min-width: 100%; padding: 1rem; }
    .main { height: 0; flex: 1; }
    .chat-area { padding: 1rem; }
    .input-area { padding: 0.75rem 1rem; }
    .msg { max-width: 95%; }
  }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>📚 DevDocs</h2>
      <span class="badge">RAG</span>
    </div>
    <div class="status-line">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">checking...</span>
    </div>
    <hr class="divider">
    <div class="sidebar-section">
      <div class="toggle-row">
        <label for="srcToggle">Show sources</label>
        <label class="toggle"><input type="checkbox" id="srcToggle" checked><span class="slider"></span></label>
      </div>
    </div>
    <hr class="divider">
    <div class="sidebar-section">
      <h3>Tips</h3>
      <p>Ask specific questions. Answers only use content from your PDFs.</p>
    </div>
    <div style="flex:1;"></div>
    <button class="btn-clear" onclick="clearChat()">Clear conversation</button>
  </aside>

  <main class="main">
    <div class="chat-area" id="chatArea">
      <div class="empty-state" id="emptyState">
        <div class="icon">🔍</div>
        <h3>No questions yet</h3>
        <p>Type a question below to search your documents.</p>
      </div>
    </div>
    <div class="input-area">
      <div id="errorBox"></div>
      <div class="input-row">
        <input type="text" id="queryInput" placeholder="Ask a question about your documents..." autofocus autocomplete="off">
        <button id="askBtn" onclick="ask()">Ask</button>
      </div>
    </div>
  </main>
</div>

<script>
  const API = location.origin;
  const chatArea = document.getElementById('chatArea');
  const emptyState = document.getElementById('emptyState');
  const queryInput = document.getElementById('queryInput');
  const askBtn = document.getElementById('askBtn');
  const errorBox = document.getElementById('errorBox');
  const srcToggle = document.getElementById('srcToggle');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  let messages = [];

  function setStatus(online) {
    statusDot.className = 'status-dot ' + (online ? 'online' : 'offline');
    statusText.textContent = online ? 'Connected' : 'Disconnected';
  }

  async function checkHealth() {
    try {
      const r = await fetch(API + '/health');
      setStatus(r.ok);
    } catch { setStatus(false); }
  }
  checkHealth();
  setInterval(checkHealth, 15000);

  function clearChat() {
    messages = [];
    chatArea.innerHTML = '';
    chatArea.appendChild(emptyState);
    emptyState.style.display = '';
    errorBox.innerHTML = '';
  }

  function showError(msg) {
    errorBox.innerHTML = '<div class="error-msg">' + msg + '</div>';
    setTimeout(() => { errorBox.innerHTML = ''; }, 8000);
  }

  function addMsg(role, content, sources) {
    if (emptyState.style.display !== 'none') emptyState.style.display = 'none';
    messages.push({ role, content, sources });
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = '<div class="label">' + (role === 'user' ? 'You' : 'Answer') + '</div>' + content;
    chatArea.appendChild(div);

    if (role === 'assistant' && sources && sources.length && srcToggle.checked) {
      const srcRow = document.createElement('div');
      srcRow.className = 'sources-row';
      sources.forEach(s => {
        const tag = document.createElement('span');
        tag.className = 'source-tag';
        tag.textContent = '📄 ' + s;
        srcRow.appendChild(tag);
      });
      chatArea.appendChild(srcRow);
    }
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function markdownToHTML(text) {
    if (!text) return '';
    let html = text;
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    html = html.replace(/^### (.+)$/gm, '<h4>$1</h4>');
    html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');
    html = html.replace(/^# (.+)$/gm, '<h2>$1</h2>');
    html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');
    html = html.replace(/\n\n/g, '</p><p>');
    html = html.replace(/\n/g, '<br>');
    return '<p>' + html + '</p>';
  }

  async function ask() {
    const q = queryInput.value.trim();
    if (!q) return;
    queryInput.value = '';
    addMsg('user', q, []);

    askBtn.disabled = true;
    queryInput.disabled = true;
    const spinner = document.createElement('div');
    spinner.className = 'spinner';
    spinner.textContent = 'Searching documents...';
    chatArea.appendChild(spinner);
    chatArea.scrollTop = chatArea.scrollHeight;

    try {
      const r = await fetch(API + '/ask', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: q })
      });
      if (!r.ok) throw new Error('Server error (' + r.status + ')');
      const data = await r.json();
      addMsg('assistant', markdownToHTML(data.answer), data.sources || []);
    } catch (e) {
      addMsg('assistant', '<span style="color:var(--red)">Error: ' + e.message + '. Check that the server is running.</span>', []);
    } finally {
      spinner.remove();
      askBtn.disabled = false;
      queryInput.disabled = false;
      queryInput.focus();
    }
  }

  queryInput.addEventListener('keydown', e => { if (e.key === 'Enter') ask(); });
</script>
</body>
</html>
