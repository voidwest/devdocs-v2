services:
  rag-app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app/data/docs:/app/app/data/docs
      - ./app/vector_db/chroma_store:/app/app/vector_db/chroma_store
    environment:
      - LLM_BASE_URL_KEY=http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless_stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    entrypoint: >
      sh -c '
        ollama serve &
        SERVER_PID=$$!
        sleep 2
        ollama pull phi3:mini
        wait $$SERVER_PID
      '
    restart: unless_stopped

volumes:
  ollama_data:
