services:
  rag-app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./app/data/docs:/app/data/docs
      - chroma_data:/app/app/vector_db/chroma_store
    environment:
      - LLM_BASE_URL_KEY=http://ollama:11434
      - PYTHONPATH=/home/appuser/.local/lib/python3.11/site-packages
      - PATH=/usr/local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/home/appuser/.local/bin
      - PYTHONUNBUFFERED=1
    depends_on:
      ollama:
        condition: service_healthy

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 900s
    entrypoint: >
      sh -c '
        ollama serve &
        SERVER_PID=$!
        sleep 2
        ollama pull phi3:mini
        wait $$SERVER_PID
      '
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://rag-app:8000
    depends_on:
      - rag-app
    restart: unless-stopped

volumes:
  ollama_data:
  chroma_data:
